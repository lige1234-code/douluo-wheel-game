<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斗罗大陆：百级成神之路</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="game-container">
    <header>
        <h1>斗罗大陆：百级成神之路</h1>
        <p>历经九重转盘，从1级废柴魂士向100级神界至尊发起冲击！</p>
    </header>

    <div class="main-layout">
        <div class="status-panel">
            <h2>魂师简谱</h2>
            <div class="status-item">
                <span class="status-label">魂师尊名：</span>
                <input type="text" id="playerNameInput" placeholder="输入你的名字" maxlength="6" style="background:#1f2937; border:1px solid #4b5563; color:#fff; padding:2px 6px; border-radius:4px; width:100px; font-size:12px;">
            </div>
            <div class="status-item">
                <span class="status-label">当前魂力：</span>
                <span class="status-value" id="status-level" style="color:#00ffff;">1 级</span>
            </div>
            <div class="status-item">
                <span class="status-label">当前境界：</span>
                <span class="status-value" id="status-rank">凡人</span>
            </div>
            <div class="status-item">
                <span class="status-label">传承武魂：</span>
                <span class="status-value" id="status-wuhun">未觉醒</span>
            </div>
            <div class="status-item">
                <span class="status-label">先天资质：</span>
                <span class="status-value" id="status-aptitude">未测试</span>
            </div>
            <div class="status-item">
                <span class="status-label">历练行迹：</span>
                <span class="status-value" id="status-training">未开始</span>
            </div>
            <div class="status-item">
                <span class="status-label">所属阵营：</span>
                <span class="status-value" id="status-faction">未加入</span>
            </div>
            <div class="status-item">
                <span class="status-label">魂力值：</span>
                <span class="status-value" id="status-soulpower" style="color:#00ff88;">10</span>
            </div>

            <div class="ring-container">
                <div class="ring-title">已吸收魂环：</div>
                <div class="ring-slots" id="ringSlots">
                    <span style="color:#4b5563; font-size:11px;">尚无魂环</span>
                </div>
            </div>
        </div>

        <div class="wheel-area">
            <h3 id="stage-title" style="margin:0; color:#ffd700; font-size:16px;">第一阶段</h3>
            <div class="wheel-outer">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="312" height="312"></canvas>
            </div>
            <button class="spin-btn" id="spinBtn">开始觉醒</button>
            <button class="spin-btn" id="restartBtn">逆天改命 (重来)</button>
            <div class="save-buttons">
                <button class="save-btn" id="exportBtn" title="导出为txt文件">📤 导出档案</button>
                <button class="save-btn" id="importBtn" title="从txt文件导入">📥 导入档案</button>
                <input type="file" id="importFile" accept=".txt" style="display:none">
            </div>
        </div>

        <div class="log-panel">
            <h2>命运烙印</h2>
            <div class="log-content" id="logContent"></div>
        </div>
    </div>
</div>

<script src="js/data.js?v=2"></script>
<script src="js/state.js?v=2"></script>
<script src="js/ui.js?v=2"></script>
<script src="js/wheel.js?v=2"></script>
<script src="js/save.js?v=2"></script>
<script src="js/main.js?v=2"></script>

</body>
</html>
